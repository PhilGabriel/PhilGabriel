name: Update Blog Posts

on:
  schedule:
    # Runs every day at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Pull latest posts from philipp-gabriel.com
        uses: gautamkrishnar/blog-post-workflow@1.9.6
        with:
          # philipp-gabriel.com is an Astro.js site, whose RSS/Atom feed
          # (via @astrojs/rss) is served at /rss.xml, not the WordPress-style
          # /feed/ path.
          feed_list: "https://philipp-gabriel.com/rss.xml"
          max_post_count: 5
